# Provider-free target DAG: orchestrates the MIGRATED CDL pipeline on
# Databricks + dbt via Airflow, using ONLY BashOperator + the stdlib
# run_databricks_task.py helper. Imports on Airflow 2.10.5 with NO
# apache-airflow-providers-databricks installed. Before running, export in
# the Airflow env: DATABRICKS_HOST, DATABRICKS_TOKEN, and CDL_HELPER (the
# absolute path to reference_cdl/run_databricks_task.py).
# Regenerate with POST /api/sfglue/airflow/emit {"provider_free": true}.
cdl_migrated_databricks:
  default_args:
    owner: cdl
    start_date: 2024-01-01
    retries: 0
  schedule: "0 2 * * *"
  catchup: false
  max_active_runs: 1
  description: "Migrated CDL pipeline on Databricks + dbt, orchestrated by Airflow"
  tasks:
    batch_open:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --notebook /Shared/sfglue/src/notebooks/fw_batch_open --catalog workspace"
    ingest_1:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --notebook /Shared/sfglue/src/notebooks/fw_file_audit --catalog workspace"
      dependencies: [batch_open]
    ingest_2:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --notebook /Shared/sfglue/src/notebooks/landing_to_raw --catalog workspace"
      dependencies: [ingest_1]
    ingest_3:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --notebook /Shared/sfglue/src/notebooks/load_confiq --catalog workspace"
      dependencies: [ingest_2]
    ingest_4:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --notebook /Shared/sfglue/src/notebooks/postgres_bronze_ingest --catalog workspace"
      dependencies: [ingest_3]
    ingest_5:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --notebook /Shared/sfglue/src/notebooks/raw_to_curated --catalog workspace"
      dependencies: [ingest_4]
    dbt_staging:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --dbt-project /Shared/sfglue/dbt --dbt-select staging --catalog workspace --warehouse 66b30eb900bcd97a"
      dependencies: [ingest_5]
    dbt_marts:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --dbt-project /Shared/sfglue/dbt --dbt-select marts --catalog workspace --warehouse 66b30eb900bcd97a"
      dependencies: [dbt_staging]
    batch_close:
      operator: airflow.operators.bash.BashOperator
      bash_command: "python3 \"$CDL_HELPER\" --host $DATABRICKS_HOST --token $DATABRICKS_TOKEN --notebook /Shared/sfglue/src/notebooks/fw_batch_close --catalog workspace"
      dependencies: [dbt_marts]
    notify:
      operator: airflow.operators.bash.BashOperator
      bash_command: "echo cdl_migrated_databricks completed"
      dependencies: [batch_close]
